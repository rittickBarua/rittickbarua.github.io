# Site-wide settings for rittickbarua.com.
# Changes to this file require a Jekyll server restart (`docker compose restart`).

# -----------------------------------------------------------------------------
# Basic site
# -----------------------------------------------------------------------------
locale                   : "en-GB"
site_theme               : "air"       # "default" or "air"
title                    : "Rittick Barua, PhD"
tagline                  : "AI & Data Science Product Leader"
title_separator          : "—"
name                     : &name "Rittick Barua, PhD"
# Provisional description pending final wording — see Phase 2 REPORT.
description              : &description "Product leader and applied data scientist. 7+ years taking enterprise ML and GenAI solutions from discovery to scaled adoption. Cambridge Engineering PhD."
# Previously pointed at rittickbarua.github.io; switched to the custom domain
# so canonical URLs match the CNAME and absolute asset paths resolve correctly.
url                      : "https://rittickbarua.com"
baseurl                  : ""
repository               : "rittickbarua/rittickbarua.github.io"
logo                     : "/images/profile.jpeg"

# -----------------------------------------------------------------------------
# Author (sidebar + jekyll-seo-tag)
# Only populated fields appear in the sidebar; blank keys are intentionally
# absent rather than placeholder-commented.
# -----------------------------------------------------------------------------
author:
  avatar           : "profile.jpeg"
  name             : *name
  bio              : *description
  location         : "London"
  employer         : "University of Cambridge"
  uri              : "https://rittickbarua.com"
  email            : "email@rittickbarua.com"

  # Academic
  googlescholar    : "https://scholar.google.co.uk/citations?user=HLBqOMUAAAAJ&hl=en"
  researchgate    : "https://www.researchgate.net/profile/Rittick-Barua-2"

  # Code & professional
  github           : "rittickBarua"
  linkedin         : "rittickbarua"

# -----------------------------------------------------------------------------
# Publications
# -----------------------------------------------------------------------------
publication_category:
  whitepapers:
    title: 'Whitepapers'
  manuscripts:
    title: 'Journal Articles'
  conferences:
    title: 'Conference Papers'
  books:
    title: 'Books'

# -----------------------------------------------------------------------------
# Site behaviour
# -----------------------------------------------------------------------------
breadcrumbs              : false
words_per_minute         : 160
future                   : false
read_more                : "disabled"
talkmap_link             : false
atom_feed:
  hide                   : false
  path                   :

# -----------------------------------------------------------------------------
# SEO verification (placeholders — replace with real tokens from each
# webmaster console before first deploy).
# -----------------------------------------------------------------------------
google_site_verification :
bing_site_verification   :

# -----------------------------------------------------------------------------
# Social sharing
# og_image drives the default Open Graph image (used when a page has no own
# header image). social.links feeds Person sameAs in schema.org JSON-LD.
# -----------------------------------------------------------------------------
og_image                 : "/images/profile.jpeg"

social:
  type                   : "Person"
  name                   : *name
  links:
    - "https://scholar.google.co.uk/citations?user=HLBqOMUAAAAJ&hl=en"
    - "https://www.researchgate.net/profile/Rittick-Barua-2"
    - "https://github.com/rittickBarua"
    - "https://www.linkedin.com/in/rittickbarua"

# -----------------------------------------------------------------------------
# Analytics — intentionally off. To enable Google Analytics 4 later, set
# provider: "google-analytics-4" and populate google.tracking_id, and
# confirm a cookie-consent strategy (UK GDPR/PECR).
# -----------------------------------------------------------------------------
analytics:
  provider               : false

# -----------------------------------------------------------------------------
# File handling
# -----------------------------------------------------------------------------
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - docker-compose.yaml
  - Gemfile
  - Gemfile.lock
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - Rakefile
  - README.md
  - CONTRIBUTING.md
  - AUDIT.md
  - REPORT.md
  - TEST_REPORT.md
  - docs
  - e2e
  - google-site-verification-PLACEHOLDER.html
  - BingSiteAuth-PLACEHOLDER.xml
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# -----------------------------------------------------------------------------
# Conversion / Markdown
# -----------------------------------------------------------------------------
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------
collections:
  publications:
    output: true
    permalink: /:collection/:path/

defaults:
  # Site-wide default og:image / twitter:image for jekyll-seo-tag
  # (it reads page.image; this makes every page inherit the profile photo
  # unless a page sets its own image in front matter).
  - scope:
      path: ""
    values:
      image: "/images/profile.jpeg"
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
      comments: false

# -----------------------------------------------------------------------------
# Sass / CSS
# -----------------------------------------------------------------------------
sass:
  sass_dir: _sass
  style: compressed

# -----------------------------------------------------------------------------
# Outputting
# -----------------------------------------------------------------------------
permalink: /:categories/:title/
timezone: Europe/London

# -----------------------------------------------------------------------------
# Plugins (kept in sync with the Gemfile's :jekyll_plugins group)
# -----------------------------------------------------------------------------
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-redirect-from
  - jemoji

# -----------------------------------------------------------------------------
# Archives (liquid-driven, GitHub Pages compatible)
# -----------------------------------------------------------------------------
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# -----------------------------------------------------------------------------
# HTML compression (production only)
# -----------------------------------------------------------------------------
compress_html:
  clippings: all
  ignore:
    envs: development
