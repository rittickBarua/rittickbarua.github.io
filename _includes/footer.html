{% include base_path %}

<div class="page__footer-copyright">
  <span class="page__footer-left">&copy; {{ site.time | date: '%Y' }} {{ site.name | default: site.title }}</span>
  {% if site.atom_feed.hide != true %}
    <a class="page__footer-rss" href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ base_path }}/feed.xml{% endif %}">RSS</a>
  {% endif %}
</div>
